name: my_password
description: Local-first password manager MVP built with Flutter.
publish_to: "none"
version: 0.1.2+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_slidable: ^3.1.2
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  cryptography: ^2.7.0
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
